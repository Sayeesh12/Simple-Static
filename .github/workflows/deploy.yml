name: Risk-Aware Safe Deploy

on:
  repository_dispatch:
    types: [safe_deploy]

  workflow_dispatch:
    inputs:
      deployment_id:
        description: Deployment ID from platform
        required: false
        default: "manual"

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.commit_id || github.sha }}

      - name: Resolve deployment metadata
        id: meta
        shell: powershell
        run: |
          $deployId = "${{ github.event.client_payload.deployment_id }}"

          if ([string]::IsNullOrWhiteSpace($deployId)) {
            $deployId = "${{ github.event.inputs.deployment_id }}"
          }

          if ([string]::IsNullOrWhiteSpace($deployId)) {
            $deployId = "manual"
          }

          $callbackUrl = "${{ github.event.client_payload.callback_url }}"

          "deployment_id=$deployId" >> $env:GITHUB_OUTPUT
          "callback_url=$callbackUrl" >> $env:GITHUB_OUTPUT

          Write-Host "Resolved deployment_id=$deployId"

      - name: Build Docker image
        shell: powershell
        run: |
          docker build -t safe-deploy:${{ steps.meta.outputs.deployment_id }} .

          if ($LASTEXITCODE -ne 0) {
            throw "Docker build failed"
          }

          Write-Host "Docker image built successfully"

      - name: Stop and remove old deployment container
        shell: powershell
        run: |
          docker rm -f safe-deploy-app 2>$null

          Start-Sleep -Seconds 2

      - name: Free port 8080
        shell: powershell
        run: |
          $containers = docker ps -a -q --filter publish=8080

          foreach ($cid in $containers) {
            Write-Host "Removing container using port 8080: $cid"

            docker stop $cid 2>$null
            docker rm -f $cid 2>$null
          }

          Start-Sleep -Seconds 3

      - name: Remove exited containers
        shell: powershell
        run: |
          docker container prune -f

      - name: Deploy new container
        shell: powershell
        run: |
          docker run -d `
            --name safe-deploy-app `
            -p 8080:80 `
            safe-deploy:${{ steps.meta.outputs.deployment_id }}

          if ($LASTEXITCODE -ne 0) {
            docker ps -a
            throw "Docker container deployment failed"
          }

          Start-Sleep -Seconds 5

          docker ps --filter name=safe-deploy-app

      - name: Verify deployment
        shell: powershell
        run: |
          try {
              $response = Invoke-WebRequest `
                -Uri "http://localhost:8080" `
                -UseBasicParsing `
                -TimeoutSec 15

              Write-Host "Deployment verification successful"
              Write-Host "HTTP Status: $($response.StatusCode)"
          }
          catch {
              docker logs safe-deploy-app
              throw "Deployment verification failed"
          }

      - name: Notify backend success
        if: success() && steps.meta.outputs.callback_url != ''
        shell: powershell
        run: |
          $headers = @{
            "Content-Type" = "application/json"
            "Authorization" = "Bearer ${{ secrets.WORKFLOW_CALLBACK_SECRET }}"
          }

          $body = @{
            status = "DEPLOYED"
            logs = @(
              "Checkout complete",
              "Docker build succeeded",
              "Container deployed successfully",
              "Verification successful"
            )
            message = "Deployment completed successfully"
          } | ConvertTo-Json -Depth 3

          Invoke-RestMethod `
            -Uri "${{ steps.meta.outputs.callback_url }}" `
            -Method POST `
            -Headers $headers `
            -Body $body

      - name: Notify backend failure
        if: failure() && steps.meta.outputs.callback_url != ''
        shell: powershell
        run: |
          try {
              $headers = @{
                "Content-Type" = "application/json"
                "Authorization" = "Bearer ${{ secrets.WORKFLOW_CALLBACK_SECRET }}"
              }

              $body = @{
                status = "FAILED"
                logs = @(
                  "GitHub Actions deployment failed"
                )
                message = "Deployment workflow failed"
              } | ConvertTo-Json -Depth 3

              Invoke-RestMethod `
                -Uri "${{ steps.meta.outputs.callback_url }}" `
                -Method POST `
                -Headers $headers `
                -Body $body
          }
          catch {
              Write-Host "Backend callback failed"
          }

      - name: Print success
        if: success()
        shell: powershell
        run: |
          Write-Host "Safe deploy completed successfully"
