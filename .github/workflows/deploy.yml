# Standalone static website repository workflow
# Use this file when your repo root contains: Dockerfile, index.html, styles.css, app.js
# Requires a self-hosted runner with Docker installed on the same machine.

name: Risk-Aware Safe Deploy

on:
  repository_dispatch:
    types: [safe_deploy]
  workflow_dispatch:
    inputs:
      deployment_id:
        description: Deployment ID from platform
        required: false
        default: "manual"

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.commit_id || github.sha }}

      - name: Resolve deployment metadata
        id: meta
        run: |
          echo "deployment_id=${{ github.event.client_payload.deployment_id || github.event.inputs.deployment_id || 'manual' }}" >> $GITHUB_OUTPUT
          echo "callback_url=${{ github.event.client_payload.callback_url }}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build -t safe-deploy:${{ steps.meta.outputs.deployment_id }} .
          echo "Built image safe-deploy:${{ steps.meta.outputs.deployment_id }}"

      - name: Stop old container
        run: |
          docker stop safe-deploy-app 2>/dev/null || true
          docker rm -f safe-deploy-app 2>/dev/null || true

      - name: Remove containers using port 8080
        run: |
          for cid in $(docker ps -q --filter publish=8080); do
            docker stop "$cid" || true
            docker rm -f "$cid" || true
          done

      - name: Deploy new container
        run: |
          docker run -d \
            --name safe-deploy-app \
            -p 8080:80 \
            safe-deploy:${{ steps.meta.outputs.deployment_id }}
          sleep 2
          docker ps --filter name=safe-deploy-app

      - name: Verify deployment
        run: |
          curl -f http://localhost:8080 || exit 1
          echo "Deployment successful — http://localhost:8080"

      - name: Notify backend — success
        if: success() && steps.meta.outputs.callback_url != ''
        run: |
          curl -sf -X POST "${{ steps.meta.outputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_CALLBACK_SECRET }}" \
            -d "{\"status\":\"DEPLOYED\",\"logs\":[\"Checkout complete\",\"Docker build succeeded\",\"Container safe-deploy-app started on :8080\"],\"message\":\"Deployed via GitHub Actions self-hosted runner\"}"

      - name: Notify backend — failure
        if: failure() && steps.meta.outputs.callback_url != ''
        run: |
          curl -sf -X POST "${{ steps.meta.outputs.callback_url }}" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.WORKFLOW_CALLBACK_SECRET }}" \
            -d "{\"status\":\"FAILED\",\"logs\":[\"GitHub Actions deploy job failed\"],\"message\":\"See workflow logs for details\"}" || true

      - name: Print success
        if: success()
        run: echo "::notice::Safe deploy completed for deployment ${{ steps.meta.outputs.deployment_id }}"
